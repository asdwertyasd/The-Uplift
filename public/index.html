<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>The Uplift — Good News, Every Day</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>" />
</head>
<body class="reels-body">

  <!-- FIXED HEADER -->
  <div class="reels-header" id="reelsHeader">
    <a href="/" class="reels-logo">
      <span class="reels-logo-sun">☀</span>
      <span class="reels-logo-text">The Uplift</span>
    </a>

    <div class="reels-search-wrap" id="searchWrap">
      <form class="reels-search-form" id="searchForm" autocomplete="off">
        <span class="reels-search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input
          type="text"
          id="searchInput"
          placeholder="Search stories, places, topics…"
          autocomplete="off"
          spellcheck="false"
        />
        <button type="button" class="search-clear-btn" id="searchClear" aria-label="Clear search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </form>
    </div>

    <a href="/post.html" class="reels-share-btn">
      <span>+</span> Share
    </a>
  </div>

  <!-- PROGRESS DOTS (right side) -->
  <div class="progress-dots" id="progressDots"></div>

  <!-- MAIN FEED -->
  <div class="reels-feed" id="reelsFeed">
    <!-- Story reels injected by JS -->
  </div>

  <!-- LOADING SCREEN -->
  <div class="reels-loading" id="reelsLoading">
    <div class="reels-loading-inner">
      <div class="spinner-ring"></div>
      <p>Loading good news…</p>
    </div>
  </div>

  <!-- EMPTY STATE -->
  <div class="reels-empty" id="reelsEmpty">
    <div class="reels-empty-icon">🌱</div>
    <h3>No stories found</h3>
    <p>Try a different search term</p>
    <button class="reels-empty-reset" id="emptyReset">Show all stories</button>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="/js/main.js"></script>
</body>
</html>
